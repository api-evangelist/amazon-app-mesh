apis:
- name: AWS App Mesh API
  description: >-
    The AWS App Mesh API provides programmatic access to configure and manage
    service mesh resources for microservices. It enables developers to create
    and manage meshes, virtual services, virtual nodes, virtual routers, and
    routes, providing fine-grained control over service-to-service communication,
    traffic routing, and observability.
