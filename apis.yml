specificationVersion: '0.19'
description: >-
  AWS App Mesh is a service mesh that provides application-level networking to
  make it easy for your services to communicate with each other across multiple
  types of compute infrastructure.
created: '2024-01-15'
modified: '2026-03-16'
apis:
  - name: AWS App Mesh API
    description: >-
      The AWS App Mesh API provides programmatic access to configure and manage
      service mesh resources for microservices. It enables developers to create
      and manage meshes, virtual services, virtual nodes, virtual routers, and
      routes, providing fine-grained control over service-to-service communication,
      traffic routing, and observability.
    image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
